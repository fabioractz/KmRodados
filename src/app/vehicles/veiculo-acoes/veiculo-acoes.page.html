<ion-header mode="ios">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/vehicles" text="Voltar"></ion-back-button>
    </ion-buttons>
    <ion-title>Ações do Veículo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-header collapse="condense" mode="ios">
    <ion-toolbar>
      <ion-title size="large">Ações do Veículo</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="ion-padding">
    <div *ngIf="veiculo">
      <div class="cabecalho-veiculo">
        <div class="dados-veiculo">
          <h2>{{ veiculo.model }} <small>({{ veiculo.plate | uppercase }})</small></h2>
          <p><strong>Tipo:</strong> {{ servicoVeiculo.getVehicleTypeName(veiculo.type) }}</p>
        </div>
        <ion-button
          fill="clear"
          size="small"
          class="botao-editar-topo"
          (click)="editarVeiculo()"
          aria-label="Editar veículo"
          title="Editar veículo">
          <ion-icon name="create-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </div>
      <p *ngIf="veiculo.odometer != null">
        <strong>Odômetro:</strong> {{ veiculo.odometer | number }} km
      </p>
    </div>

    <div class="ion-margin-top" *ngIf="veiculo">
      <div class="quick-action-row" (click)="abastecer()">
        <div class="square-icon-btn square-icon-btn-abastecimento">
          <ion-icon name="gas-station" aria-hidden="true"></ion-icon>
        </div>
        <span class="action-label">Abastecer</span>
      </div>

      <div class="quick-action-row" (click)="fazerMedia()">
        <div class="square-icon-btn square-icon-btn-media">
          <ion-icon name="speedometer" aria-hidden="true"></ion-icon>
        </div>
        <span class="action-label">Fazer Média</span>
      </div>

      <div class="quick-action-row" (click)="manutencao()">
        <div class="square-icon-btn square-icon-btn-manutencao">
          <ion-icon name="construct-outline" aria-hidden="true"></ion-icon>
        </div>
        <span class="action-label">Manutenção</span>
      </div>

    </div>
  </div>
</ion-content>
