<ion-header [translucent]="true" mode="ios">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/vehicles" text="Voltar"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ titulo_pagina }}</ion-title>
  </ion-toolbar>
  </ion-header>
  
  <ion-content [fullscreen]="true">
    <ion-header collapse="condense" mode="ios">
      <ion-toolbar>
        <ion-title size="large">{{ titulo_pagina }}</ion-title>
      </ion-toolbar>
    </ion-header>
  
    <div class="ion-padding">
      <ion-card *ngIf="hasValidationErrors" class="validation-card">
        <ion-card-content>
          <p><strong>Campos obrigatórios não preenchidos:</strong></p>
          <ul>
            <li *ngFor="let field of missingFields">{{ field }}</li>
          </ul>
        </ion-card-content>
      </ion-card>

      <!-- 1. Tipo de Veículo -->
      <ion-item button detail="true" class="item-tipo-veiculo" [class.required-field]="tipoError" (click)="abrirSeletorTipoVeiculo()">
        <ion-icon *ngIf="tipo" [name]="tipo === 'car' ? 'car-sport-outline' : tipo === 'motorcycle' ? 'moto-custom' : tipo === 'truck' ? 'truck-heavy' : tipo === 'bus' ? 'bus-outline' : 'car-outline'" slot="start" color="primary"></ion-icon>
        <ion-icon *ngIf="!tipo" name="car-sport-outline" slot="start" color="medium"></ion-icon>
        <div class="label-container">
          <ion-label>Tipo de Veículo *</ion-label>
          <ion-text *ngIf="tipo">{{ obter_nome_tipo(tipo) }}</ion-text>
          <ion-text *ngIf="!tipo" color="medium">Selecione o tipo</ion-text>
        </div>
      </ion-item>

      <!-- 2. Modelo -->
      <ion-item [class.required-field]="modeloError">
        <ion-input label="Modelo *" label-placement="floating" placeholder="Ex: Fiat Uno" [(ngModel)]="modelo" (ionInput)="modeloError = false"></ion-input>
      </ion-item>
      
      <!-- 3. Placa -->
      <ion-item [class.required-field]="placaError">
        <ion-input label="Placa *" label-placement="floating" placeholder="Ex: ABC-1234" [(ngModel)]="placa" (ionInput)="placaError = false" style="text-transform: uppercase;"></ion-input>
      </ion-item>

      <!-- Botão Mostrar mais/menos -->
      <div class="ion-text-start ion-margin-vertical ion-padding-start">
        <span 
          (click)="mostrarMaisCampos = !mostrarMaisCampos" 
          style="color: var(--ion-color-primary); cursor: pointer; text-decoration: underline;">
          {{ mostrarMaisCampos ? '- Mostrar menos' : '+ Mostrar mais' }}
        </span>
      </div>

      <!-- Campos Secundários -->
      <div *ngIf="mostrarMaisCampos">
        <ion-item class="odometer-item">
          <ion-input
            label="Odômetro (Inicial)"
            label-placement="floating"
            type="tel"
            inputmode="decimal"
            placeholder="Opcional"
            [(ngModel)]="odometroStr"
            (ionInput)="formatOdometer($event)"
            class="odometer-input">
          </ion-input>
          <span
            slot="end"
            class="icone-ajuda-odometro"
            tabindex="0"
            (click)="ajuda_odometro.mostrarAjudaOdometro($event)">?</span>
        </ion-item>
  
        <ion-item>
          <ion-textarea label="Observações" label-placement="floating" placeholder="Opcional" [(ngModel)]="observacoes" rows="3"></ion-textarea>
        </ion-item>
      </div>
  
      <ion-button expand="block" class="ion-margin-top" (click)="salvar()">
        {{ placa_original ? 'Atualizar Veículo' : 'Salvar Veículo' }}
      </ion-button>
  
      <ion-button expand="block" color="medium" class="ion-margin-top" (click)="cancelar()">
        Cancelar
      </ion-button>
    </div>
  </ion-content>
